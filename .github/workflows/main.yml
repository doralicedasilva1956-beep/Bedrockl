name: Gerar APK na Aba Releases
on:
  workflow_dispatch: # Botão manual na aba Actions
  push:
    tags:
      - 'v*' # Dispara quando você cria uma tag (ex: v1.0)
  release:
    types: [published] # Dispara quando você publica uma release no site

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Criar gradlew (Motor)
        run: |
          curl -L https://raw.githubusercontent.com/android/architecture-samples/main/gradlew -o gradlew
          chmod +x gradlew

      - name: Fabricar APK
        run: ./gradlew assembleDebug

      - name: Colocar APK na Aba Releases
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/*.apk
          tag_name: v1.0
          name: "Pocket Launcher v1.0"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
